# Global vars
# passed into playbook run as extra vars
vars:
  var1: val1

steps:
  step1:
    run: playbook1.yml
    vars:
      var2: val2
  step2:
    after:
      - step1
    run: playbook2.yml
  step3:
    after:
      - step1
    run: playbook3.yml
    vars:
      var1: foo
    when:
      - step1 is failed
  step4:
    after:
      - step2
    run: pb4.yml
